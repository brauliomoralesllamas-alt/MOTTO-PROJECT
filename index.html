<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOTTO PROJECT - XP Rewards</title>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <script src="config.js"></script>
    <style>
        :root {
            --primary-red: #8E1B1B;
            --accent-orange: #f36d21;
            --bg-dark: #0a0a0a;
            --card-bg: #161616;
            --text-light: #ffffff;
            --input-height: 60px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-dark); color: var(--text-light);
            font-family: 'Inter', sans-serif; padding: 20px 15px;
            text-align: center; overflow-x: hidden;
            /* Previene el zoom accidental al hacer tap en móviles */
            touch-action: manipulation;
        }

        .container {
            max-width: 450px; margin: 0 auto; position: relative;
            animation: fadeInUP 0.8s ease-out forwards;
        }

        @keyframes fadeInUP {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .motto-logo { font-family: 'Bungee', cursive; font-size: 4.5rem; line-height: 0.8; margin-bottom: 5px; }
        .motto-subtitle { letter-spacing: 6px; color: var(--accent-orange); font-weight: bold; margin-bottom: 25px; text-transform: uppercase; font-size: 0.85rem; }

        .today-badge {
            background: rgba(243, 109, 33, 0.15); color: var(--accent-orange);
            display: inline-block; padding: 8px 18px; border-radius: 50px;
            font-weight: 800; font-size: 0.85rem; margin-bottom: 20px;
            border: 1px solid var(--accent-orange); text-transform: uppercase;
        }

        /* --- ESTILO VIDEOJUEGO: REWARDS --- */
        .loyalty-card {
            background: #111; border: 2px solid #222;
            padding: 22px 18px; border-radius: 20px; margin-bottom: 10px;
            position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .loyalty-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .loyalty-tag { font-size: 0.75rem; color: var(--accent-orange); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .xp-label { font-size: 0.75rem; color: #888; font-weight: 800; transition: color 0.3s ease; }

        /* Contenedor de la barra */
        .xp-track {
            width: 100%; height: 22px; background: #222;
            border-radius: 50px; border: 1px solid #333;
            position: relative; overflow: hidden;
        }

        /* La barra que se llena */
        .xp-bar {
            width: 0%; height: 100%;
            background: linear-gradient(90deg, #f36d21, #ff8c00);
            box-shadow: 0 0 15px rgba(243, 109, 33, 0.6);
            transition: width 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            position: relative; z-index: 1;
        }

        /* Brillo animado de la barra */
        .xp-bar::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shine 2s infinite;
        }
        @keyframes shine { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        /* Icono de recompensa al final de la barra */
        .reward-icon {
            position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
            font-size: 0.9rem; z-index: 2; opacity: 0.4;
            transition: all 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            filter: grayscale(100%);
        }

        /* Estado activo de la recompensa (Level Up) */
        .reward-icon.active {
            opacity: 1; transform: translateY(-50%) scale(1.4);
            filter: grayscale(0%); text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
        }

        .loyalty-msg { font-size: 0.9rem; color: #eee; margin-top: 15px; font-weight: 600; min-height: 1.2rem; transition: all 0.3s ease; }

        /* Animación Especial de Level Up para la tarjeta */
        @keyframes levelUpPulse {
            0% { transform: scale(1); border-color: #222; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
            50% { transform: scale(1.02); border-color: #FFD700; box-shadow: 0 0 30px rgba(255, 215, 0, 0.4); }
            100% { transform: scale(1); border-color: var(--accent-orange); box-shadow: 0 10px 25px rgba(243, 109, 33, 0.3); }
        }
        .card-level-up { animation: levelUpPulse 1.2s ease-out forwards; }
        .text-gold { color: #FFD700 !important; text-shadow: 0 0 8px rgba(255, 215, 0, 0.5); }
        /* ---------------------------------- */

        .order-summary {
            background: var(--card-bg); padding: 25px 20px;
            border-radius: 25px; margin-bottom: 20px; border: 1px solid #222;
            transition: transform 0.3s ease;
        }
        .total-display { font-size: 2.8rem; font-weight: 900; color: white; display: block; transition: all 0.3s ease; }
        .discount-label { color: #25D366; font-size: 0.85rem; font-weight: 800; margin-top: 8px; display: none; text-transform: uppercase; letter-spacing: 1px; }

        .qty-selector { display: flex; align-items: center; justify-content: center; gap: 30px; margin-top: 15px; }
        .qty-btn {
            background: #222; border: 2px solid var(--accent-orange); color: var(--accent-orange);
            width: 55px; height: 55px; border-radius: 50%; font-size: 2rem;
            cursor: pointer; font-weight: 900; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .qty-btn:active { transform: scale(0.9); background: var(--accent-orange); color: white; }
        #qtyValue { font-size: 2.4rem; font-weight: 900; min-width: 40px; text-align: center; }

        .order-form { display: flex; flex-direction: column; gap: 12px; }

        /* Estilos de Inputs fluidos */
        input, select {
            height: var(--input-height); width: 100%; background: var(--card-bg);
            border: 2px solid #222; border-radius: 18px; color: white;
            padding: 0 20px; font-size: 1.2rem; font-weight: 600; text-align: center;
            outline: none; transition: all 0.3s ease; appearance: none;
        }
        input:focus, select:focus { border-color: var(--accent-orange); box-shadow: 0 0 15px rgba(243, 109, 33, 0.2); transform: translateY(-2px); }
        input::placeholder { color: #555; font-weight: 600; }

        /* Animación Glow Up para el Autofill */
        @keyframes autofillGlow {
            0% { border-color: #222; box-shadow: 0 0 0 transparent; }
            40% { border-color: #25D366; box-shadow: 0 0 20px rgba(37, 211, 102, 0.6); transform: scale(1.02); }
            100% { border-color: var(--accent-orange); box-shadow: 0 0 10px rgba(243, 109, 33, 0.2); transform: scale(1); }
        }
        .input-autofilled { animation: autofillGlow 1s ease-out forwards; color: #fff !important; }

        #soldOutOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center;
            backdrop-filter: blur(10px); padding: 30px;
        }
        .sold-out-card { border: 2px solid var(--accent-orange); padding: 50px 20px; border-radius: 30px; background: #000; width: 100%; max-width: 350px;}
        .sold-out-card h2 { font-family: 'Bungee'; color: var(--accent-orange); font-size: 3rem; }

        .btn-whatsapp {
            height: 70px; background: #25D366; color: white; border: none; border-radius: 20px; font-weight: 900; font-size: 1.2rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 15px;
            transition: all 0.3s ease; box-shadow: 0 8px 20px rgba(37, 211, 102, 0.3);
        }
        .btn-whatsapp:active { transform: translateY(4px); box-shadow: 0 2px 10px rgba(37, 211, 102, 0.3); }
        .btn-whatsapp svg { width: 30px; height: 30px; fill: white; }

        @keyframes pulse-discount {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); color: #25D366; }
            100% { transform: scale(1); }
        }
        .applied-discount { animation: pulse-discount 0.8s ease; color: #25D366 !important;}
    </style>
</head>
<body>

<div id="soldOutOverlay">
    <div class="sold-out-card">
        <h2>SOLD OUT</h2>
        <p style="margin-top:15px; font-size: 1.2rem; color:#ccc;">¡Regresamos pronto!</p>
    </div>
</div>

<div class="container">
    <h1 class="motto-logo">MOTTO</h1>
    <p class="motto-subtitle">Teriyaki Project</p>

    <div class="today-badge">🥢 Pedidos Hoy</div>

    <div class="order-summary">
        <span class="total-display" id="totalDisplay">$0 MXN</span>
        <div id="discountMsg" class="discount-label">✨ REGALO DE BIENVENIDA -$30</div>
        <div class="qty-selector">
            <button type="button" class="qty-btn" onclick="cambiarCantidad(-1)">−</button>
            <span id="qtyValue">1</span>
            <button type="button" class="qty-btn" onclick="cambiarCantidad(1)">+</button>
        </div>
    </div>

    <form class="order-form">
        <input type="tel" id="telefono" placeholder="Número de Celular" autocomplete="tel" required>

        <div class="loyalty-card" id="loyaltyCard">
            <div class="loyalty-header">
                <span class="loyalty-tag">Motto XP Rewards</span>
                <span class="xp-label" id="xpStatus">0 / 5 BOWLS</span>
            </div>
            <div class="xp-track">
                <div class="xp-bar" id="xpBar"></div>
                <span class="reward-icon" id="rewardIcon">🎁</span>
            </div>
            <p class="loyalty-msg" id="loyaltyMessage">Ingresa tu número para subir de nivel.</p>
        </div>

        <input type="text" id="nombre" placeholder="Tu Nombre Completo" autocomplete="name" required>
        <input type="text" id="direccion" placeholder="Dirección (Torre / Depto)" required>
        <select id="horario" required></select>

        <button type="button" class="btn-whatsapp" id="btnWhatsApp" onclick="enviarWhatsApp()">
            <svg viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.588-5.946 0-6.556 5.332-11.891 11.891-11.891 3.181 0 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.481 8.415 0 6.556-5.333 11.892-11.893 11.892-1.99 0-3.951-.5-5.688-1.448l-6.306 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.886-9.887 0-2.64-1.03-5.123-2.9-6.995s-4.347-2.898-6.986-2.898c-5.448 0-9.886 4.437-9.886 9.885 0 2.235.614 3.535 1.558 5.223l-1.01 3.693 3.784-1.009zm11.246-6.757c-.301-.15-1.779-.877-2.054-.976-.275-.102-.475-.152-.674.151-.199.302-.772.977-.947 1.178-.175.201-.35.226-.651.075-.302-.151-1.274-.47-2.426-1.5-.897-.801-1.502-1.789-1.678-2.09-.175-.302-.019-.465.132-.614.135-.133.302-.352.453-.527.151-.176.201-.302.302-.502.101-.199.051-.376-.026-.525-.075-.15-.674-1.625-.923-2.227-.243-.585-.489-.506-.674-.515-.173-.008-.371-.01-.57-.01s-.521.074-.794.372c-.272.298-1.041 1.016-1.041 2.477s1.066 2.871 1.216 3.072c.15.201 2.097 3.201 5.078 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.779-.726 2.029-1.428.25-.701.25-1.303.175-1.428-.076-.125-.276-.199-.577-.35z"/></svg>
            CONFIRMAR PEDIDO
        </button>
    </form>
</div>

<script>
    let cantidad = 1;
    let tieneDescuentoBienvenida = false;

    function actualizarPrecio() {
        let precioBase = cantidad * MOTTO_CONFIG.precioBowl;
        let total = tieneDescuentoBienvenida ? (precioBase - MOTTO_CONFIG.descuentoBienvenida) : precioBase;
        const display = document.getElementById('totalDisplay');

        display.textContent = `$${total} MXN`;

        if(tieneDescuentoBienvenida) {
            display.classList.add('applied-discount');
            document.getElementById('discountMsg').style.display = 'block';
        } else {
            display.classList.remove('applied-discount');
            document.getElementById('discountMsg').style.display = 'none';
        }
    }

    function cambiarCantidad(v) {
        if(MOTTO_CONFIG.isSoldOut) return;
        cantidad += v; if (cantidad < 1) cantidad = 1;

        const qtyVal = document.getElementById('qtyValue');
        qtyVal.style.transform = 'scale(1.2)';
        setTimeout(() => qtyVal.style.transform = 'scale(1)', 150);

        qtyVal.textContent = cantidad;
        actualizarPrecio();
    }

    async function consultarDatosYLealtad() {
        const telInput = document.getElementById('telefono');
        const tel = telInput.value.replace(/\D/g,'');
        const msgLabel = document.getElementById('loyaltyMessage');
        const xpBar = document.getElementById('xpBar');
        const xpStatus = document.getElementById('xpStatus');
        const card = document.getElementById('loyaltyCard');
        const rewardIcon = document.getElementById('rewardIcon');

        if (tel.length < 10) {
            // Reset visuales si borra el número
            xpBar.style.width = "0%";
            card.classList.remove('card-level-up');
            xpStatus.classList.remove('text-gold');
            rewardIcon.classList.remove('active');
            xpStatus.innerText = "0 / 5 BOWLS";
            msgLabel.innerHTML = "Ingresa tu número para subir de nivel.";
            return;
        }

        msgLabel.innerText = "Sincronizando datos...";
        try {
            const response = await fetch(`${MOTTO_CONFIG.scriptURL}?telefono=${tel}`);
            const data = await response.json();
            const pedidos = data.pedidosTotales || 0;

            // LÓGICA DE BARRA (Ciclo de 5 bowls)
            let progreso = pedidos % 5;
            let porcentaje = (progreso / 5) * 100;

            // Si tiene 5, 10, 15... la barra está llena para reclamar regalo
            if (pedidos > 0 && progreso === 0) {
                porcentaje = 100;
                xpStatus.innerText = "¡RECOMPENSA DISPONIBLE!";
                xpStatus.classList.add('text-gold');
                msgLabel.innerHTML = "🏆 ¡NIVEL MÁXIMO! Tienes un regalo hoy.";

                // Activar animaciones de victoria
                card.classList.add('card-level-up');
                rewardIcon.classList.add('active');
            } else {
                xpStatus.innerText = `${progreso} / 5 BOWLS`;
                xpStatus.classList.remove('text-gold');
                let faltantes = 5 - progreso;
                msgLabel.innerHTML = `Te faltan <span style='color:var(--accent-orange)'>${faltantes} bowls</span> para subir de nivel.`;

                // Limpiar animaciones
                card.classList.remove('card-level-up');
                rewardIcon.classList.remove('active');
            }

            // Animamos la barra
            xpBar.style.width = porcentaje + "%";

            // Lógica Bienvenida & Autofill
            if (pedidos === 0) {
                tieneDescuentoBienvenida = true;
                msgLabel.innerHTML = "✨ ¡NUEVO JUGADOR! Tienes -$30 de regalo.";
            } else {
                tieneDescuentoBienvenida = false;
                if (data.nombre) {
                    const nomInput = document.getElementById('nombre');
                    const dirInput = document.getElementById('direccion');

                    nomInput.value = data.nombre;
                    dirInput.value = data.direccion;

                    // Reiniciar animación para que corra cada vez que se detecta
                    nomInput.classList.remove('input-autofilled');
                    dirInput.classList.remove('input-autofilled');
                    void nomInput.offsetWidth; // Trigger reflow mágico
                    nomInput.classList.add('input-autofilled');
                    dirInput.classList.add('input-autofilled');
                }
            }
            actualizarPrecio();
        } catch (e) { msgLabel.innerText = "¡Pide hoy tu Motto!"; }
    }

    function generarHorarios() {
        const sel = document.getElementById('horario');
        const ahora = new Date();
        sel.innerHTML = '<option value="" disabled selected>Hora de entrega</option>';
        for (let h = MOTTO_CONFIG.startHour; h <= MOTTO_CONFIG.endHour; h++) {
            for (let m = 0; m < 60; m += 30) {
                if (h === MOTTO_CONFIG.endHour && m > 0) break;
                let h12 = h > 12 ? h - 12 : h;
                if(h12 === 0) h12 = 12;
                let txt = `${h12}:${m === 0 ? '00' : m} ${h >= 12 ? 'PM' : 'AM'}`;
                let slot = new Date(); slot.setHours(h, m, 0, 0);
                if (ahora.getTime() + 1800000 > slot.getTime()) continue;
                let o = document.createElement('option'); o.value = txt; o.textContent = txt;
                sel.appendChild(o);
            }
        }
    }

    async function enviarWhatsApp() {
        if(MOTTO_CONFIG.isSoldOut) return;
        const nom = document.getElementById('nombre').value, tel = document.getElementById('telefono').value,
              hor = document.getElementById('horario').value, dir = document.getElementById('direccion').value;
        if(!nom || !tel || !dir || !hor) { alert("⚠️ Elige una hora y completa tus datos."); return; }

        let precioBase = cantidad * MOTTO_CONFIG.precioBowl;
        let totalFinal = tieneDescuentoBienvenida ? (precioBase - MOTTO_CONFIG.descuentoBienvenida) : precioBase;

        fetch(MOTTO_CONFIG.scriptURL, {
            method: 'POST', mode: 'no-cors',
            body: JSON.stringify({ nombre: nom, telefono: tel, dia: 'HOY', horario: hor, direccion: dir, cantidad: cantidad, total: totalFinal })
        });

        const discStr = tieneDescuentoBienvenida ? `%0A🎁 *Descuento Bienvenida:* -$30` : "";
        const msg = `¡Hola Motto! 🥢%0A%0AQuiero *${cantidad} bowl(s) para HOY*.%0A👤 *Cliente:* ${nom}%0A📞 *Tel:* ${tel}%0A⏰ *Hora:* ${hor}%0A📍 *Dir:* ${dir}${discStr}%0A💰 *Total:* $${totalFinal} MXN`;
        window.open(`https://wa.me/524424672058?text=${msg}`, '_blank');
    }

    window.onload = () => {
        actualizarPrecio();
        if (MOTTO_CONFIG.isSoldOut) document.getElementById('soldOutOverlay').style.display = 'flex';
        generarHorarios();
        document.getElementById('telefono').addEventListener('input', consultarDatosYLealtad);
    };
</script>
</body>
</html>
